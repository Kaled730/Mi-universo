<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi corazon es de ti</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            width:100%;
            height:100vh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            radial-gradient(circle at top,
            #2a0017,
            #12000a,
            #000);
            font-family:Arial, sans-serif;
            position:relative;
        }
        .stars{
            position:absolute;
            inset:0;
            background-image:
            radial-gradient(white 1px, transparent 1px);
            background-size:50px 50px;
            opacity:0.18;
            animation:moveStars 40s linear infinite;
            z-index:0;
        }
        @keyframes moveStars{
            from{
                transform:translateY(0);
            }
            to{
                transform:translateY(-500px);
            }
        }
        .container{
            position:relative;
            width:600px;
            height:600px;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:2;
        }
        .ui_love_word{
            position:absolute;
            left:50%;
            top:50%;
            color:#ff8fc7;
            font-size:1.2rem;
            white-space:nowrap;
            transform-style:preserve-3d;
            text-shadow:
            0 0 10px #ff8fc7,
            0 0 20px #ff4fa3,
            0 0 40px #ff1493;
            opacity:0;
            animation:heartAnim 4s infinite linear;
        }
        @keyframes heartAnim{
            0%{
                opacity:0;
                transform:
                translate3d(var(--x), var(--y), -120px)
                scale(0.6);
            }
            50%{
                opacity:1;
                transform:
                translate3d(var(--x), var(--y), 0px)
                scale(1.1);
            }
            100%{
                opacity:0;
                transform:
                translate3d(var(--x), var(--y), 120px)
                scale(0.6);
            }
        }
        .message{
            position:absolute;
            bottom:40px;
            text-align:center;
            color:#ffd6ea;
            font-size:1.2rem;
            letter-spacing:2px;
            animation:pulse 2s infinite;
            z-index:3;
        }
        @keyframes pulse{
            0%{
                opacity:0.4;
            }

            50%{
                opacity:1;
            }

            100%{
                opacity:0.4;
            }
        }
        @media(max-width:700px){
            .container{
                width:350px;
                height:350px;
            }
            .ui_love_word{
                font-size:0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1 style="color: white; text-align: center;">MI CORAZON ES DE TI  <br> Y SOLO DE TI TE AMO <br>ARIII!!</h1>
    <div class="stars"></div>
    <div class="container" id="heart-container"></div>
    <div class="message">TE AMO ♥</div>
    <audio id="bgMusic" loop>
        <source src="../music/HASTA LA MUERTE (IVAN CORNEJO) - Eslabon Armado - DEL Records 2022.mp3" type="audio/mp3">
    </audio>
    <script>
        const container =
        document.getElementById('heart-container');
        const total = 100;
        for(let i = 0; i < total; i++){
            const angle =
            (i / total) * Math.PI * 2;
            const x =
            16 * Math.pow(Math.sin(angle), 3);
            const y =
            -(13 * Math.cos(angle)
            - 5 * Math.cos(2 * angle)
            - 2 * Math.cos(3 * angle)
            - Math.cos(4 * angle));
            const layer =
            document.createElement('div');
            layer.className =
            'ui_love_word';
            layer.innerText =
            'TE AMO ♥';
            const scale = 14;
            layer.style.setProperty(
                '--x',
                `${x * scale}px`
            );
            layer.style.setProperty(
                '--y',
                `${y * scale}px`
            );
            layer.style.animationDelay =
            `${i * 0.05}s`;
            container.appendChild(layer);
        }
        const music =
        document.getElementById("bgMusic");
        music.play().catch(() => {
            console.log("Autoplay bloqueado");
        });
        document.addEventListener("click", () => {
            music.play();
        }, { once:true });
    </script>
</body>
</html>
